<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contexto - AI Translator</title>
    <meta
      name="description"
      content="Translate into authentic regional dialects with AI. Contexto delivers natural, culturally accurate language that sounds like a real native speaker."
    />
    <link rel="icon" href="/src/assets/globe.ico" type="image/x-icon" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function () {
        const saved = localStorage.getItem("theme");
        const theme =
          saved === "dark" || saved === "light"
            ? saved
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
  </body>
</html>
